syntax = "proto3";

package voxmind.client;

option csharp_namespace = "VoxMind.ClientGrpc";

service VoxMindClientService {
  // Inscription du client auprès du serveur
  rpc RegisterClient(RegisterRequest) returns (RegisterResponse);

  // Désinscription du client
  rpc UnregisterClient(UnregisterRequest) returns (Empty);

  // Keep-alive du client
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Stream audio du client vers le serveur (client-side streaming)
  rpc StreamAudio(stream AudioChunkMessage) returns (StreamAudioResponse);

  // Recevoir des commandes du serveur (server-side streaming)
  rpc SubscribeCommands(SubscribeRequest) returns (stream ServerCommand);
}

message RegisterRequest {
  string client_id = 1;
  string client_name = 2;
  string auth_token = 3;
  string platform = 4;
}

message RegisterResponse {
  bool success = 1;
  string error = 2;
}

message UnregisterRequest {
  string client_id = 1;
  string auth_token = 2;
}

message HeartbeatRequest {
  string client_id = 1;
}

message HeartbeatResponse {
  bool alive = 1;
}

message AudioChunkMessage {
  string client_id = 1;
  bytes audio_data = 2;
  int32 sample_rate = 3;
  int64 timestamp_ms = 4;
}

message StreamAudioResponse {
  bool accepted = 1;
  int64 chunks_received = 2;
}

message SubscribeRequest {
  string client_id = 1;
  string auth_token = 2;
}

message ServerCommand {
  string command = 1;
  string payload_json = 2;
}

message Empty {}
